name: Primesys Admin Build and Deploy


on:
    push:
        branches:
            - main


jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code from Github Repository
              uses: actions/checkout@v4

            - name: Setup Node.js Environment
              uses: actions/setup-node@v4
              with:
                node-version: '24'
                cache: 'npm'

            - name: Install Dependencies and Build Project React
              run: |
                npm ci
                npm run build

            - name: Deploy Compiled Files to VPS via Rsync
              uses: appleboy/scp-action@v0.1.7
              with:
                host: ${{secrets.SERVER_IP}}
                username: ${{secrets.SERVER_USER}}
                key: ${{secrets.SSH_PRIVATE_KEY}}
                port: 22
                source: "dist/*"
                target: "/var/www/html/mykidtracker"
                strip_components: 1